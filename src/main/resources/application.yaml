spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/warehouse-route-optimizer
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    show-sql: true
    generate-ddl: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
