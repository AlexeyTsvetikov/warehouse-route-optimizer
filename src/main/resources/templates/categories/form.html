<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма категории</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .btn-danger {
            background-color: #e57373;
            border-color: #e57373;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container mt-5" style="max-width: 700px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i th:if="${id == null}" class="bi bi-plus-circle"></i>
            <i th:unless="${id == null}" class="bi bi-pencil-square"></i>
            <span th:text="${id != null} ? 'Редактировать категорию' : 'Создать категорию'">Форма</span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <form th:action="@{${id != null ? '/categories/edit/' + id : '/categories/create'}}"
              th:object="${categoryForm}" method="post">
            <div class="mb-3">
                <label class="form-label" for="name"><i class="bi bi-tag"></i> Название</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" required
                       aria-label="Название категории">
            </div>

            <div class="mb-3">
                <label class="form-label" for="description"><i class="bi bi-file-text"></i> Описание</label>
                <textarea th:field="*{description}" id="description" class="form-control" rows="3"
                          aria-label="Описание категории"></textarea>
            </div>
            <div class="d-flex gap-2 mb-3">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сохранить
                </button>
                <a href="/categories" class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>
        </form>

        <form sec:authorize="hasAnyRole('ADMIN', 'MANAGER')"
              th:if="${id != null}" th:action="@{/categories/delete/{id}(id=${id})}" method="post" class="mt-4"
              onsubmit="return confirm('Вы уверены, что хотите удалить категорию? Это действие нельзя будет отменить.');">
            <button type="submit" class="btn btn-danger w-100">
                <i class="bi bi-trash3"></i> Удалить категорию
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
