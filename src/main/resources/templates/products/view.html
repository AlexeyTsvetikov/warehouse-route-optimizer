<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточка товара</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .nav-tabs {
            display: flex;
            flex-wrap: nowrap;
            border-bottom: none;
        }
        .nav-tabs .nav-item {
            flex: 1;
            text-align: center;
        }
        .nav-tabs .nav-link {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #495057;
            font-weight: 500;
            padding: 10px 0;
            transition: all 0.2s ease;
        }
        .nav-tabs .nav-link.active {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
        }
        .nav-tabs .nav-link:hover:not(.active) {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }

        .info-label {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-box-seam"></i> <span th:text="${product.sku}">Товар</span>
        </h1>

        <!-- Центрированные вкладки -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#main">
                    <i class="bi bi-info-circle"></i> Основное
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#stocks">
                    <i class="bi bi-grid-3x2"></i> Остатки
                </a>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="main">
                <div class="info-container">
                    <div class="row mb-2 info-row">
                        <div class="col-sm-4 info-label">SKU:</div>
                        <div class="col-sm-8" th:text="${product.sku}">—</div>
                    </div>
                    <div class="row mb-2 info-row">
                        <div class="col-sm-4 info-label">Название:</div>
                        <div class="col-sm-8" th:text="${product.name}">—</div>
                    </div>
                    <div class="row mb-2 info-row">
                        <div class="col-sm-4 info-label">Категория:</div>
                        <div class="col-sm-8" th:text="${product.categoryName}">—</div>
                    </div>
                    <div class="row mb-2 info-row">
                        <div class="col-sm-4 info-label">Описание:</div>
                        <div class="col-sm-8" th:text="${product.description != null ? product.description : '—'}">—
                        </div>
                    </div>
                    <div class="row mb-2 info-row">
                        <div class="col-sm-4 info-label">Вес (кг):</div>
                        <div class="col-sm-8" th:text="${product.weight != null ? product.weight : '—'}">—</div>
                    </div>
                    <div class="row mb-3 info-row">
                        <div class="col-sm-4 info-label">Габариты (Ш×Г×В):</div>
                        <div class="col-sm-8"
                             th:text="${product.width != null && product.depth != null && product.height != null ? product.width + '×' + product.depth + '×' + product.height : '—'}">
                            —
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <a href="/products" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-arrow-left"></i> Назад
                    </a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-pencil-square"></i> Редактировать
                    </a>
                </div>
            </div>

            <div class="tab-pane fade" id="stocks">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th><i class="bi bi-geo-alt"></i> Локация</th>
                            <th><i class="bi bi-123"></i> Количество</th>
                            <th><i class="bi bi-lock"></i> Резерв</th>
                            <th><i class="bi bi-check-circle"></i> Доступно</th>
                            <th><i class="bi bi-calendar-date"></i> Дата поступления</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="stock : ${stocks}">
                            <td th:text="${stock.locationCode}">—</td>
                            <td th:text="${stock.quantity}">0</td>
                            <td th:text="${stock.reservedQuantity}">0</td>
                            <td th:text="${stock.availableQuantity}">0</td>
                            <td th:text="${stock.inboundDate != null ? #temporals.format(stock.inboundDate, 'dd.MM.yyyy HH:mm') : '—'}">
                                —
                            </td>
                        </tr>
                        <tr th:if="${stocks.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-inbox"></i> Нет остатков
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-start mt-3">
                    <a href="/products" class="btn btn-outline-secondary flex-fill">
                        <i class="bi bi-arrow-left"></i> Назад
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>>
