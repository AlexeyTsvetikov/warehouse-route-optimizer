<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-box-seam"></i> Товары
        </h1>

        <div class="row g-2 mb-4 align-items-center">
            <div class="col-auto">
                <a href="/dashboard" class="btn btn-outline-secondary" title="Перейти на главную страницу">
                    <i class="bi bi-house-door"></i>
                </a>
            </div>

            <div class="col-12 col-md-3">
                <select aria-label="Фильтр по категории" class="form-select" onchange="window.location.href='/products?category=' + this.value">
                    <option value="">Все категории</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == selectedCategory}"></option>
                </select>
            </div>
            <div class="col-12 col-md">
                <form th:action="@{/products}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control"
                           placeholder="Поиск..." aria-label="Поиск по артикулу или наименованию">
                    <button type="submit" class="btn btn-primary" title="Найти">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/products" class="btn btn-outline-secondary" title="Сбросить поиск">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>
            <div class="col-12 col-md-auto" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                <a href="/products/create" class="btn btn-success w-100">
                    <i class="bi bi-plus-lg"></i> Добавить
                </a>
            </div>
        </div>

        <!-- Таблица товаров -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-upc-scan"></i> SKU</th>
                    <th><i class="bi bi-tag"></i> Название</th>
                    <th><i class="bi bi-folder"></i> Категория</th>
                    <th><i class="bi bi-file-text"></i> Описание</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}" th:onclick="|window.location='/products/' + ${p.id}|"
                    style="cursor: pointer;">
                    <td class="fw-bold" th:text="${p.sku}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.categoryName}"></td>
                    <td th:text="${p.description != null ? p.description : '—'}"></td>
                </tr>
                <tr th:if="${products.isEmpty()}">
                    <td colspan="4" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i> Ничего не найдено
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
            <a th:href="@{/products(page=${currentPage - 1}, category=${selectedCategory}, search=${search})}"
               th:unless="${currentPage == 1}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span class="pagination-text">
                <i class="bi bi-layout-text-window"></i> Страница <strong th:text="${currentPage}"></strong> из <strong
                    th:text="${totalPages}"></strong>
            </span>
            <a th:href="@{/products(page=${currentPage + 1}, category=${selectedCategory}, search=${search})}"
               th:unless="${currentPage == totalPages}"
               class="btn btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
