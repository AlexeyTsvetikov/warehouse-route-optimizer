<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма товара</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .btn-danger {
            background-color: #e57373;
            border-color: #e57373;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container mt-5" style="max-width: 700px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i th:if="${id == null}" class="bi bi-plus-circle"></i>
            <i th:unless="${id == null}" class="bi bi-pencil-square"></i>
            <span th:text="${id != null} ? 'Редактировать товар' : 'Создать товар'">Форма</span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <form th:action="@{${id != null ? '/products/edit/' + id : '/products/create'}}"
              th:object="${productForm}" method="post">

            <div class="mb-3">
                <label class="form-label" for="sku"><i class="bi bi-upc-scan"></i> SKU</label>
                <input type="text" th:field="*{sku}" id="sku" class="form-control" required aria-label="SKU товара">
            </div>

            <div class="mb-3">
                <label class="form-label" for="name"><i class="bi bi-tag"></i> Название</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" required
                       aria-label="Название товара">
            </div>

            <div class="mb-3">
                <label class="form-label" for="categoryName"><i class="bi bi-folder"></i> Категория</label>
                <select th:field="*{categoryName}" id="categoryName" class="form-select" required
                        aria-label="Категория товара">
                    <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" for="description"><i class="bi bi-file-text"></i> Описание</label>
                <textarea th:field="*{description}" id="description" class="form-control" rows="3"
                          aria-label="Описание товара"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="weight"><i class="bi bi-balance"></i> Вес (кг)</label>
                    <input type="number" step="0.01" th:field="*{weight}" id="weight" class="form-control"
                           aria-label="Вес товара в килограммах">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="width"><i class="bi bi-aspect-ratio"></i> Ширина</label>
                    <input type="number" step="0.01" th:field="*{width}" id="width" class="form-control"
                           aria-label="Ширина товара в сантиметрах">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="height"><i class="bi bi-aspect-ratio"></i> Высота</label>
                    <input type="number" step="0.01" th:field="*{height}" id="height" class="form-control"
                           aria-label="Высота товара в сантиметрах">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" for="depth"><i class="bi bi-aspect-ratio"></i> Глубина</label>
                    <input type="number" step="0.01" th:field="*{depth}" id="depth" class="form-control"
                           aria-label="Глубина товара в сантиметрах">
                </div>
            </div>

            <div class="d-flex gap-2 mb-3">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сохранить
                </button>
                <a href="/products" class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>
        </form>

        <form th:if="${id != null}" th:action="@{/products/delete/{id}(id=${id})}" method="post" class="mt-4"
              onsubmit="return confirm('Вы уверены, что хотите удалить товар? Это действие нельзя будет отменить.');">
            <button type="submit" class="btn btn-danger w-100">
                <i class="bi bi-trash3"></i> Удалить товар
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
