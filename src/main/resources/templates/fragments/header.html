<nav th:fragment="navbar" xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="navbar navbar-light bg-white shadow-sm mb-4 border-bottom">
    <div class="container d-flex justify-content-between align-items-center py-2">
        <a href="/tasks" class="btn btn-outline-secondary btn-sm" title="На главную">
            <i class="bi bi-house-door"></i>
        </a>

        <div class="d-flex gap-1">
            <a href="/categories"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Категории</a>
            <a href="/products"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Товары</a>
            <a href="/stocks"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Запасы</a>
            <a href="/locations"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Локации</a>
            <a href="/tasks"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Задачи</a>
            <a href="/orders"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Заказы</a>
            <a sec:authorize="hasRole('ADMIN')" href="/users"
               class="text-dark text-decoration-none fw-medium small px-3 py-1 rounded-pill hover-bg-light">Пользователи</a>
        </div>

        <div class="dropdown">
            <button class="btn btn-link text-dark text-decoration-none dropdown-toggle" type="button"
                    data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i><span sec:authentication="name"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li><span class="dropdown-item-text text-muted small" sec:authentication="principal.authorities"></span>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" th:href="@{/users/change-password/self}">
                    <i class="bi bi-key"></i> Сменить пароль</a></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="bi bi-box-arrow-right"></i> Выйти
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
