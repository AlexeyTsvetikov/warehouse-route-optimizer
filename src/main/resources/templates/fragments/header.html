<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">

<body>
<nav th:fragment="navbar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="/dashboard">
            <i class="bi bi-box-seam"></i> WMS
        </a>
        <div class="navbar-nav ms-auto">
            <div class="dropdown">
                <button class="btn btn-link nav-link dropdown-toggle text-dark" type="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle text-secondary"></i>
                    <span sec:authentication="name"></span>
                    <span class="badge bg-success ms-1" sec:authentication="principal.authorities"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                    <li><span class="dropdown-item-text">Учетная запись: <strong sec:authentication="name"></strong></span></li>
                    <li><span class="dropdown-item-text text-muted small" sec:authentication="principal.authorities"></span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" th:href="@{/users/change-password}">
                        <i class="bi bi-key"></i> Сменить пароль</a></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right"></i> Выйти
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
