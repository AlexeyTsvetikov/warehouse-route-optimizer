<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="/dashboard">
            <i class="bi bi-box-seam"></i> WMS
        </a>
        <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    <i class="bi bi-person-circle text-secondary"></i>
                    <span class="fw-medium" sec:authentication="name"></span>
                    <span class="badge bg-success ms-1" sec:authentication="principal.authorities"></span>
                </span>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
