<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<div class="card card-custom" style="min-height: 70vh; display: flex; flex-direction: column;">
  <!-- Заголовок -->
  <div class="p-3 border-bottom text-center">
    <h5 class="mb-0 text-dark fw-bold">Товары</h5>
  </div>

  <!-- Фильтр + Поиск -->
  <div class="p-3 border-bottom">
    <select class="form-select mb-2" onchange="this.form.submit()" form="productSearchForm" name="category"
            aria-label="Категория товаров">
      <option value="">Все категории</option>
      <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
              th:selected="${cat.id == selectedCategory}"></option>
    </select>
    <form id="productSearchForm" th:action="@{/tsd/products}" method="get" class="d-flex gap-2">
      <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Поиск товаров..."
             aria-label="Поиск по артикулу или наименованию">
      <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i></button>
      <a th:href="@{/tsd/products}" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i></a>
    </form>
  </div>

  <!-- Список -->
  <div class="p-3 overflow-auto" style="flex: 1;">
    <div th:if="${!products.isEmpty()}">
      <a th:each="p : ${products}" th:href="@{/products/{id}(id=${p.id}, tsd=true)}"
         class="list-group-item list-group-item-action mb-2 rounded p-3 shadow-sm">
        <div class="d-flex align-items-center">
          <div class="bg-light rounded p-2 me-3">
            <i class="bi bi-box2 text-secondary" style="font-size: 1.5rem;"></i>
          </div>
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between">
              <strong class="text-dark" th:text="${p.sku}"></strong>
              <small class="text-muted" th:text="${p.categoryName}"></small>
            </div>
            <div class="mt-1 text-dark" th:text="${p.name}"></div>
          </div>
          <div class="ms-2">
            <i class="bi bi-chevron-right text-muted"></i>
          </div>
        </div>
      </a>
    </div>
    <div th:if="${products.isEmpty()}" class="text-center text-muted py-5">
      <i class="bi bi-inbox" style="font-size: 4rem;"></i>
      <p class="mt-2">Ничего не найдено</p>
    </div>
  </div>

  <!-- Пагинация -->
  <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3 px-3 pb-3">
    <a th:href="@{/tsd/products(page=${currentPage - 1}, category=${selectedCategory}, search=${search})}"
       th:unless="${currentPage == 1}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад
    </a>
    <span class="pagination-text">Страница <strong th:text="${currentPage}"></strong> из <strong th:text="${totalPages}"></strong></span>
    <a th:href="@{/tsd/products(page=${currentPage + 1}, category=${selectedCategory}, search=${search})}"
       th:unless="${currentPage == totalPages}" class="btn btn-outline-secondary">
      Вперёд <i class="bi bi-arrow-right"></i>
    </a>
  </div>
</div>
</body>
</html>
