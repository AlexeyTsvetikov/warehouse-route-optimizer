<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<div class="card card-custom" style="min-height: 70vh; display: flex; flex-direction: column;">
  <!-- Заголовок -->
  <div class="p-3 border-bottom text-center">
    <h5 class="mb-0 text-dark fw-bold">Задачи</h5>
  </div>

  <!-- Фильтр -->
  <div class="p-3 border-bottom">
    <select class="form-select" onchange="this.form.submit()" form="taskFilterForm" name="status" aria-label="Статус задачи">
      <option value="CREATED" th:selected="${selectedStatus == null or selectedStatus.name() == 'CREATED'}">Новые</option>
      <option value="ASSIGNED" th:selected="${selectedStatus?.name() == 'ASSIGNED'}">Мои</option>
      <option value="IN_PROGRESS" th:selected="${selectedStatus?.name() == 'IN_PROGRESS'}">В работе</option>
    </select>
    <form id="taskFilterForm" th:action="@{/tsd/tasks}" method="get" class="d-none"></form>
  </div>

  <!-- Список -->
  <div class="p-3 overflow-auto" style="flex: 1;">
    <div th:if="${!tasks.isEmpty()}">
      <a th:each="task : ${tasks}"
         th:href="|/tsd/tasks/${task.id}|"
         class="list-group-item list-group-item-action mb-2 rounded p-3 shadow-sm text-decoration-none">
        <div class="d-flex align-items-center">
          <div class="bg-light rounded p-2 me-3">
            <i class="bi bi-box-seam text-secondary" style="font-size: 1.5rem;"></i>
          </div>
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between">
              <strong class="text-dark" th:text="${task.productSku}"></strong>
              <span class="badge fs-6"
                    th:classappend="${task.status.name() == 'CREATED' ? 'badge-new' : (task.status.name() == 'ASSIGNED' ? 'badge-assigned' : 'badge-processing')}"
                    th:text="${task.status}"></span>
            </div>
            <div class="mt-1 d-flex justify-content-between">
              <small class="text-muted">
                <i class="bi bi-geo-alt"></i> <span th:text="${task.sourceLocationCode}"></span>
              </small>
              <span class="badge bg-secondary" th:text="${task.plannedQuantity + ' шт.'}"></span>
            </div>
          </div>
          <div class="ms-2">
            <i class="bi bi-chevron-right text-muted"></i>
          </div>
        </div>
      </a>
    </div>
    <div th:if="${tasks.isEmpty()}" class="text-center text-muted py-5">
      <i class="bi bi-inbox" style="font-size: 4rem;"></i>
      <p class="mt-2">Нет активных задач</p>
    </div>
  </div>

  <!-- Пагинация -->
  <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3 px-3 pb-3">
    <a th:href="@{/tsd/tasks(page=${currentPage - 1}, status=${selectedStatus?.name()})}"
       th:unless="${currentPage == 1}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад
    </a>
    <span class="pagination-text">Страница <strong th:text="${currentPage}"></strong> из <strong th:text="${totalPages}"></strong></span>
    <a th:href="@{/tsd/tasks(page=${currentPage + 1}, status=${selectedStatus?.name()})}"
       th:unless="${currentPage == totalPages}" class="btn btn-outline-secondary">
      Вперёд <i class="bi bi-arrow-right"></i>
    </a>
  </div>
</div>
</body>
</html>
