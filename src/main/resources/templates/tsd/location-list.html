<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<div class="card card-custom" style="min-height: 70vh; display: flex; flex-direction: column;">
    <!-- Заголовок -->
    <div class="p-3 border-bottom text-center">
        <h5 class="mb-0 text-dark fw-bold">Локации</h5>
    </div>

    <!-- Поиск -->
    <div class="p-3 border-bottom">
        <form th:action="@{/tsd/locations}" method="get" class="d-flex gap-2">
            <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Поиск локаций..."
                   aria-label="Поиск по коду или типу локации">
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i></button>
            <a th:href="@{/tsd/locations}" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i></a>
        </form>
    </div>

    <!-- Список -->
    <div class="p-3 overflow-auto" style="flex: 1;">
        <div th:if="${!locations.isEmpty()}">
            <div th:each="loc : ${locations}"
                 class="list-group-item mb-2 rounded p-3 shadow-sm border-0" style="background: #fff;">
                <div class="d-flex align-items-center">

                    <!-- Иконка с динамическим цветом (опционально) -->
                    <div class="bg-light rounded p-2 me-3">
                        <i class="bi bi-geo-alt text-secondary"
                           th:classappend="${loc.isActive} ? 'text-primary' : 'text-muted'"
                           style="font-size: 1.5rem;"></i>
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong class="text-dark" th:text="${loc.code}"></strong>
                                <!-- Тип локации просто текстом через разделитель или в скобках -->
                                <span class="text-muted ms-2 small" th:text="'• ' + ${loc.type}"></span>
                            </div>
                            <!-- Статус в виде компактной метки -->
                            <small th:class="${loc.isActive} ? 'text-success' : 'text-danger'"
                                   class="fw-medium">
                                <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>
                                <span th:text="${loc.isActive} ? 'Активна' : 'Не активна'"></span>
                            </small>
                        </div>
                        <!-- Описание -->
                        <div class="mt-1 text-secondary small" th:text="${loc.description}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${locations.isEmpty()}" class="text-center text-muted py-5">
            <i class="bi bi-inbox" style="font-size: 4rem;"></i>
            <p class="mt-2">Ничего не найдено</p>
        </div>
    </div>

    <!-- Пагинация -->
    <div th:if="${totalPages > 1}" class="p-3 border-top">
        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/tsd/locations(page=${currentPage - 1}, search=${search})}"
               th:unless="${currentPage == 1}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span class="pagination-text">
            <i class="bi bi-layout-text-window"></i> Страница <strong th:text="${currentPage}"></strong> из <strong
                    th:text="${totalPages}"></strong>
        </span>
            <a th:href="@{/tsd/locations(page=${currentPage + 1}, search=${search})}"
               th:unless="${currentPage == totalPages}" class="btn btn-sm btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
</div>
</body>
</html>
