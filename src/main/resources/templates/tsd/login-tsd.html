<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSD WMS - Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #e0f2e9 0%, #c8e6d9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .login-card {
      border-radius: 15px;
      border: none;
    }
    .tsd-icon {
      font-size: 3rem;
      color: #2b7e3a;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card shadow">
        <div class="card-body p-4 text-center">
          <i class="bi bi-upc-scan tsd-icon mb-3"></i>
          <h4 class="mb-3">TSD WMS</h4>

          <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle"></i> Неверный логин или пароль
          </div>

          <form th:action="@{/login}" method="post">
            <input type="hidden" name="tsd" value="true"/>
            <div class="mb-3 text-start">
              <label class="form-label"><i class="bi bi-person"></i> Логин</label>
              <input type="text" name="username" class="form-control"
                     placeholder="Введите логин" required autofocus aria-label="Логин">
            </div>
            <div class="mb-4 text-start">
              <label class="form-label"><i class="bi bi-lock"></i> Пароль</label>
              <input type="password" name="password" class="form-control"
                     placeholder="Введите пароль" required aria-label="Пароль">
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Запомнить меня</label>
            </div>
            <button type="submit" class="btn btn-secondary w-100 py-2">
              <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
          </form>
          <a href="/login" class="btn btn-link btn-sm mt-2 text-muted">ПК-версия</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
