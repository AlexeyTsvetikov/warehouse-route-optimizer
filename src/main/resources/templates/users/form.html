<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .btn-danger {
            background-color: #e57373;
            border-color: #e57373;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container mt-5" style="max-width: 700px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i th:if="${id == null}" class="bi bi-plus-circle"></i>
            <i th:unless="${id == null}" class="bi bi-pencil-square"></i>
            <span th:text="${id != null} ? 'Редактировать пользователя' : 'Создать пользователя'">Форма</span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <form th:action="@{${id != null ? '/users/edit/' + id : '/users/create'}}"
              th:object="${userForm}" method="post">

            <div class="mb-3">
                <label class="form-label" for="username"><i class="bi bi-person-badge"></i> Логин</label>
                <input type="text" th:field="*{username}" id="username" class="form-control" required
                       aria-label="Логин пользователя">
            </div>

            <div class="mb-3" th:unless="${id != null}">
                <label class="form-label" for="password"><i class="bi bi-key"></i> Пароль</label>
                <input type="password" name="password" id="password" class="form-control" required
                       aria-label="Пароль пользователя">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="firstName"><i class="bi bi-person"></i> Имя</label>
                    <input type="text" th:field="*{firstName}" id="firstName" class="form-control"
                           aria-label="Имя пользователя">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" for="lastName"><i class="bi bi-person"></i> Фамилия</label>
                    <input type="text" th:field="*{lastName}" id="lastName" class="form-control"
                           aria-label="Фамилия пользователя">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="role"><i class="bi bi-shield"></i> Роль</label>
                <select th:field="*{role}" id="role" class="form-select" required aria-label="Роль пользователя">
                    <option th:each="r : ${T(ru.tsvetikov.warehouse.router.model.enums.Role).values()}"
                            th:value="${r}"
                            th:text="${r}"></option>
                </select>
            </div>

            <div th:if="${id != null}" class="mt-4">
                <a th:href="@{/users/change-password/{id}(id=${id})}" class="btn btn-outline-warning w-100">
                    <i class="bi bi-key"></i> Сменить пароль
                </a>
            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сохранить
                </button>
                <a href="/users" class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>

        </form>

        <form th:if="${id != null}" th:action="@{/users/delete/{id}(id=${id})}" method="post" class="mt-4"
              onsubmit="return confirm('Вы уверены, что хотите удалить пользователя? Это действие нельзя будет отменить.');">
            <button type="submit" class="btn btn-danger w-100">
                <i class="bi bi-trash3"></i> Удалить пользователя
            </button>
        </form>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
