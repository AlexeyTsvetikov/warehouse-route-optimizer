<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-people"></i> Пользователи
        </h1>

        <div class="row g-2 mb-4 align-items-center">
            <div class="col-auto">
                <a href="/dashboard" class="btn btn-outline-secondary" title="Перейти на главную страницу">
                    <i class="bi bi-house-door"></i>
                </a>
            </div>

            <div class="col-12 col-md-3">
                <select aria-label="Фильтр по роли" class="form-select"
                        onchange="window.location.href='/users?role=' + this.value">
                    <option value="">Все роли</option>
                    <option th:each="r : ${T(ru.tsvetikov.warehouse.router.model.enums.Role).values()}"
                            th:value="${r.name()}"
                            th:text="${r.name()}"
                            th:selected="${r.name() == selectedRole}"></option>
                </select>
            </div>

            <div class="col-12 col-md">
                <form th:action="@{/users}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control"
                           placeholder="Поиск по логину, имени или фамилии..."
                           aria-label="Поиск пользователей">
                    <button type="submit" class="btn btn-primary" title="Найти">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/users" class="btn btn-outline-secondary" title="Сбросить поиск">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>

            <div class="col-12 col-md-auto">
                <a href="/users/create" class="btn btn-success w-100">
                    <i class="bi bi-plus-lg"></i> Добавить
                </a>
            </div>
        </div>

        <!-- Таблица пользователей -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-person-badge"></i> Логин</th>
                    <th><i class="bi bi-person"></i> Имя</th>
                    <th><i class="bi bi-person"></i> Фамилия</th>
                    <th><i class="bi bi-shield"></i> Роль</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}" th:onclick="|window.location='/users/edit/' + ${u.id}|"
                    style="cursor: pointer;">
                    <td class="fw-bold" th:text="${u.username}"></td>
                    <td th:text="${u.firstName != null ? u.firstName : '—'}"></td>
                    <td th:text="${u.lastName != null ? u.lastName : '—'}"></td>
                    <td th:text="${u.role}"></td>
                </tr>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="4" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i> Пользователи не найдены
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
            <a th:href="@{/users(page=${currentPage - 1}, role=${selectedRole}, search=${search})}"
               th:unless="${currentPage == 1}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span class="pagination-text">
                <i class="bi bi-layout-text-window"></i> Страница<strong th:text="${currentPage}"></strong> из
                <strong th:text="${totalPages}"></strong>
            </span>
            <a th:href="@{/users(page=${currentPage + 1}, role=${selectedRole}, search=${search})}"
               th:unless="${currentPage == totalPages}"
               class="btn btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>

    </div>
</div>

</body>
</html>
