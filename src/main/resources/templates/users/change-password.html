<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i class="bi bi-key"></i> Смена пароля
        </h1>

        <form th:action="@{/users/change-password/{id}(id=${userId})}" method="post">
            <div class="mb-3">
                <label for="oldPassword" class="form-label">Старый пароль</label>
                <input type="password" id="oldPassword" name="oldPassword" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="newPassword" class="form-label">Новый пароль</label>
                <input type="password" id="newPassword" name="newPassword" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сменить пароль
                </button>
                <a th:href="@{/users/edit/{id}(id=${userId})}" class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
