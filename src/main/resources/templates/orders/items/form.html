<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Товар в заказе</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        .btn-danger {
            background-color: #e57373;
            border-color: #e57373;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i th:if="${id == null}" class="bi bi-plus-circle"></i>
            <i th:unless="${id == null}" class="bi bi-pencil-square"></i>
            <span th:text="${id != null} ? 'Редактировать товар' : 'Добавить товар'">Форма</span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <form th:action="@{${id != null ? '/orders/' + orderNumber + '/items/edit/' + id : '/orders/' + orderNumber + '/items/create'}}"
              th:object="${orderItemForm}" method="post">

            <div class="mb-3">
                <label class="form-label" for="productSearch"><i class="bi bi-box-seam"></i> Товар</label>
                <input type="text" id="productSearch" class="form-control"
                       th:value="${selectedProductText}"
                       placeholder="Начните вводить SKU или название...">
                <input type="hidden" th:field="*{productSku}" id="productSku">
            </div>

            <div class="mb-3">
                <label class="form-label" for="quantity"><i class="bi bi-123"></i> Количество</label>
                <input type="number" th:field="*{quantity}" id="quantity" class="form-control" required min="1">
            </div>

            <div class="d-flex gap-2 mb-3">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сохранить
                </button>
                <a th:href="@{/orders/{orderNumber}(orderNumber=${orderNumber})}"
                   class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>
        </form>

        <form th:if="${id != null}"
              th:action="@{/orders/{orderNumber}/items/delete/{id}(orderNumber=${orderNumber}, id=${id})}" method="post"
              class="mt-4">
            <button type="submit" class="btn btn-danger w-100"
                    onclick="return confirm('Вы уверены, что хотите удалить этот товар из заказа?');">
                <i class="bi bi-trash3"></i> Удалить позицию
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('productSearch');
        const hiddenSku = document.getElementById('productSku');
        const initialValue = searchInput.value;

        if (initialValue) {
            hiddenSku.value = initialValue.split(' ')[0];
        }

        // noinspection JSUnusedGlobalSymbols
        new TomSelect('#productSearch', {
            load: function (query, callback) {
                if (!query.length) return callback();
                fetch('/api/products/search?query=' + encodeURIComponent(query))
                    .then(response => response.json())
                    .then(data => {
                        callback(data.map(/** @param {{sku: string, name: string}} p */(p) => ({
                            value: p.sku,
                            text: p.sku + ' - ' + p.name
                        })));
                    })
                    .catch(() => callback());
            },
            onChange: function (value) {
                hiddenSku.value = value;
            },
            maxOptions: 20,
            maxItems: 1,
            create: false,
            placeholder: 'Начните вводить SKU или название...'
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
