<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5" style="max-width: 700px;">
    <div class="card card-custom p-4">
        <h1 class="text-center mb-4">
            <i th:if="${orderNumber == null}" class="bi bi-plus-circle"></i>
            <i th:unless="${orderNumber == null}" class="bi bi-pencil-square"></i>
            <span th:text="${orderNumber != null} ? 'Редактировать заказ' : 'Создать заказ'">Форма</span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <form th:action="@{${orderNumber != null ? '/orders/edit/' + orderNumber : '/orders/create'}}"
              th:object="${orderForm}" method="post">

            <div class="mb-3">
                <label class="form-label" for="type"><i class="bi bi-tag"></i> Тип заказа</label>
                <select th:field="*{type}" id="type" class="form-select" required aria-label="Тип заказа">
                    <option th:each="t : ${orderTypes}" th:value="${t}" th:text="${t}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" for="customerName"><i class="bi bi-person"></i> Клиент (опционально)</label>
                <input type="text" th:field="*{customerName}" id="customerName" class="form-control"
                       aria-label="Имя клиента">
            </div>

            <div class="mb-3">
                <label class="form-label" for="destinationRegion"><i class="bi bi-geo-alt"></i> Регион доставки</label>
                <input type="text" th:field="*{destinationRegion}" id="destinationRegion" class="form-control" required
                       aria-label="Регион доставки">
            </div>

            <div class="mb-3">
                <label class="form-label" for="priority"><i class="bi bi-star"></i> Приоритет (1-3)</label>
                <input type="number" th:field="*{priority}" id="priority" class="form-control" min="1" max="3"
                       aria-label="Приоритет заказа">
            </div>

            <div class="mb-3">
                <label class="form-label" for="plannedDeparture"><i class="bi bi-calendar"></i> Плановая отгрузка</label>
                <input type="datetime-local" th:field="*{plannedDeparture}" id="plannedDeparture"
                       class="form-control" required aria-label="Дата и время отгрузки">
            </div>

            <div class="d-flex gap-2 mb-3">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-check-lg"></i> Сохранить
                </button>
                <a href="/orders" class="btn btn-outline-secondary flex-fill">
                    <i class="bi bi-x-lg"></i> Отмена
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
