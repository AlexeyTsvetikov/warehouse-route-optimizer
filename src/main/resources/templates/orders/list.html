<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-truck"></i> Заказы
        </h1>

        <div class="row g-2 mb-4 align-items-center">
            <div class="col-auto">
                <a href="/dashboard" class="btn btn-outline-secondary" title="Перейти на главную страницу">
                    <i class="bi bi-house-door"></i>
                </a>
            </div>

            <div class="col-12 col-md-3">
                <select aria-label="Фильтр по статусу" class="form-select"
                        onchange="window.location.href='/orders?status=' + this.value">
                    <option value="">Все статусы</option>
                    <option th:each="s : ${allStatuses}"
                            th:value="${s.name()}"
                            th:text="${s}"
                            th:selected="${s.name() == selectedStatus?.name()}"></option>
                </select>
            </div>

            <div class="col-12 col-md">
                <form th:action="@{/orders}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control"
                           placeholder="Поиск по номеру, клиенту или региону..."
                           aria-label="Поиск заказов">
                    <button type="submit" class="btn btn-primary" title="Найти">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/orders" class="btn btn-outline-secondary" title="Сбросить поиск">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>

            <div class="col-12 col-md-auto">
                <a href="/orders/create" class="btn btn-success w-100">
                    <i class="bi bi-plus-lg"></i> Добавить
                </a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-hash"></i> Номер</th>
                    <th><i class="bi bi-tag"></i> Тип</th>
                    <th><i class="bi bi-person"></i> Клиент</th>
                    <th><i class="bi bi-geo-alt"></i> Регион</th>
                    <th><i class="bi bi-star"></i> Приоритет</th>
                    <th><i class="bi bi-calendar"></i> Отправка</th>
                    <th><i class="bi bi-info-circle"></i> Статус</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}"
                    th:data-url="|/orders/${order.orderNumber}|"
                    onclick="window.location.href=this.getAttribute('data-url')"
                    style="cursor: pointer;">
                <td class="fw-bold" th:text="${order.orderNumber}"></td>
                    <td th:text="${order.type}"></td>
                    <td th:text="${order.customerName != null ? order.customerName : '—'}"></td>
                    <td th:text="${order.destinationRegion}"></td>
                    <td th:text="${order.priority}"></td>
                    <td th:text="${#temporals.format(order.plannedDeparture, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                        <span th:class="${order.status.name() == 'NEW' ? 'badge-new' :
                  (order.status.name() == 'PROCESSING' ? 'badge-processing' :
                  (order.status.name() == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled'))}"
                              th:text="${order.status}"></span>
                    </td>
                </tr>
                <tr th:if="${orders.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i> Заказы не найдены
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
            <a th:href="@{/orders(page=${currentPage - 1}, status=${selectedStatus?.name()}, search=${search})}"
               th:unless="${currentPage == 1}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span class="pagination-text">
        <i class="bi bi-layout-text-window"></i> Страница <strong th:text="${currentPage}"></strong> из <strong th:text="${totalPages}"></strong>
    </span>
            <a th:href="@{/orders(page=${currentPage + 1}, status=${selectedStatus?.name()}, search=${search})}"
               th:unless="${currentPage == totalPages}"
               class="btn btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>

    </div>
</div>

</body>
</html>
