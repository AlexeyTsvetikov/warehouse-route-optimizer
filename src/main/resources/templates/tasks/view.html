<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточка задачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        .nav-tabs {
            display: flex;
            flex-wrap: nowrap;
            border-bottom: none;
        }

        .nav-tabs .nav-item {
            flex: 1;
            text-align: center;
        }

        .nav-tabs .nav-link {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #495057;
            font-weight: 500;
            padding: 10px 0;
            transition: all 0.2s ease;
        }

        .nav-tabs .nav-link.active {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
        }

        .nav-tabs .nav-link:hover:not(.active) {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }

        .table-equal-cols {
            width: 100%;
            table-layout: fixed;
        }

        .table-equal-cols th,
        .table-equal-cols td {
            width: 50%;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-check2-square"></i> Задача <span th:text="${task.taskNumber}"></span>
        </h1>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
        </div>

        <ul class="nav nav-tabs mb-3" id="taskTabs">
            <li class="nav-item">
                <a class="nav-link active" id="main-tab" data-bs-toggle="tab" href="#main" role="tab">Основное</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="details-tab" data-bs-toggle="tab" href="#details" role="tab">Детали</a>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Вкладка Основное -->
            <div class="tab-pane active" id="main">
                <table class="table table-bordered table-equal-cols">
                    <tr>
                        <th>Тип задачи</th>
                        <td th:text="${task.type}">—</td>
                    </tr>
                    <tr>
                        <th>Статус</th>
                        <td>
                <span th:class="${task.status.name() == 'CREATED' ? 'badge-new' :
                                (task.status.name() == 'ASSIGNED' ? 'badge-processing' :
                                (task.status.name() == 'IN_PROGRESS' ? 'badge-processing' :
                                (task.status.name() == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled')))}"
                      th:text="${task.status}"></span>
                        </td>
                    </tr>
                    <tr>
                        <th>Товар (SKU)</th>
                        <td th:text="${task.productSku}">—</td>
                    </tr>
                    <tr>
                        <th>Плановое количество</th>
                        <td th:text="${task.plannedQuantity}">—</td>
                    </tr>
                    <tr>
                        <th>Подтверждённое количество</th>
                        <td th:text="${task.confirmedQuantity != null ? task.confirmedQuantity : '—'}">—</td>
                    </tr>
                    <tr>
                        <th>Оператор</th>
                        <td th:text="${task.assignedUsername != null ? task.assignedUsername : '—'}">—</td>
                    </tr>
                    <tr>
                        <th>Заказ</th>
                        <td th:text="${task.orderNumber != null ? task.orderNumber : '—'}">—</td>
                    </tr>
                    <tr>
                        <th>Откуда (локация)</th>
                        <td th:text="${task.sourceLocationCode != null ? task.sourceLocationCode : '—'}">—</td>
                    </tr>
                    <tr>
                        <th>Куда (локация)</th>
                        <td th:text="${task.targetLocationCode != null ? task.targetLocationCode : '—'}">—</td>
                    </tr>
                </table>

                <!-- Кнопки действий (только на вкладке Основное) -->

                <!-- Назначить -->
                <div class="flex-fill" th:if="${task.status.name() == 'CREATED'}">
                    <form th:action="@{/tasks/{id}/assign(id=${task.id})}" method="post">
                        <div class="input-group">
                            <input type="text" id="assignUserSearch" class="form-control"
                                   placeholder="Начните вводить логин оператора..."
                                   aria-label="Логин оператора">
                            <input type="hidden" name="username" id="assignedUsernameHidden">
                            <button type="submit" class="btn btn-secondary">
                                <i class="bi bi-person-plus"></i> Назначить
                            </button>
                        </div>
                    </form>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <!-- Редактировать -->
                    <div class="flex-fill" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" th:if="${task.status.name() == 'CREATED'}">
                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-secondary w-100">
                            <i class="bi bi-pencil-square"></i> Редактировать
                        </a>
                    </div>


                    <!-- Старт -->
                    <div class="flex-fill" th:if="${task.status.name() == 'ASSIGNED'}">
                        <form th:action="@{/tasks/{id}/start(id=${task.id})}" method="post">
                            <button type="submit" class="btn btn-secondary w-100">
                                <i class="bi bi-play-fill"></i> Старт
                            </button>
                        </form>
                    </div>

                    <!-- Завершить -->
                    <div class="flex-fill" th:if="${task.status.name() == 'IN_PROGRESS'}">
                        <form th:action="@{/tasks/{id}/complete(id=${task.id})}" method="post">
                            <div class="input-group">
                                <input type="number" name="confirmedQuantity" class="form-control" placeholder="Кол-во"
                                       aria-label="Подтверждённое количество" th:value="${task.plannedQuantity}" min="0"
                                       th:max="${task.plannedQuantity}">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-lg"></i> Завершить
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Отменить -->
                    <div class="flex-fill"
                         th:if="${task.status.name() == 'CREATED' or task.status.name() == 'ASSIGNED' or task.status.name() == 'IN_PROGRESS'}">
                        <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post">
                            <button type="submit" class="btn btn-secondary w-100"
                                    onclick="return confirm('Отменить задачу?')">
                                <i class="bi bi-x-lg"></i> Отменить
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Кнопка назад -->
                <div class="d-flex mt-3">
                    <a href="/tasks" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-arrow-left"></i> Назад к списку
                    </a>
                </div>
            </div>

            <!-- Вкладка Детали -->
            <div class="tab-pane fade" id="details">
                <table class="table table-bordered table-equal-cols">
                    <tr>
                        <th>ID задачи</th>
                        <td th:text="${task.id}">—</td>
                    </tr>
                    <tr>
                        <th>Номер задачи</th>
                        <td th:text="${task.taskNumber}">—</td>
                    </tr>
                    <tr>
                        <th>Время создания</th>
                        <td th:text="${#temporals.format(task.createdAt, 'dd.MM.yyyy HH:mm')}">—</td>
                    </tr>
                    <tr>
                        <th>Время обновления</th>
                        <td th:text="${task.updatedAt != null ? #temporals.format(task.updatedAt, 'dd.MM.yyyy HH:mm') : '—'}">
                            —
                        </td>
                    </tr>
                    <tr>
                        <th>Время завершения</th>
                        <td th:text="${task.completedAt != null ? #temporals.format(task.completedAt, 'dd.MM.yyyy HH:mm') : '—'}">
                            —
                        </td>
                    </tr>
                </table>

                <!-- Кнопка назад -->
                <div class="d-flex mt-3">
                    <a href="/tasks" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-arrow-left"></i> Назад к списку
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.location.hash === '#details') {
            const detailsTab = document.querySelector('#details-tab');
            if (detailsTab) {
                new bootstrap.Tab(detailsTab).show();
            }
        }
    });
</script>
<script>
    new TomSelect('#assignUserSearch', {
        load: function (query, callback) {
            if (!query.length) return callback();
            fetch('/api/users/search?query=' + encodeURIComponent(query))
                .then(response => response.json())
                .then(data => {
                    callback(data.map(u => ({
                        value: u.username,
                        text: u.username
                    })));
                })
                .catch(() => callback());
        },
        onChange: function (value) {
            document.getElementById('assignedUsernameHidden').value = value;
        },
        maxOptions: 20,
        maxItems: 1,
        create: false,
        placeholder: 'Начните вводить логин...'
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
