<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Локации</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-geo-alt"></i> Локации склада
        </h1>

        <!-- Блок поиска и кнопок -->
        <div class="row g-2 mb-4 align-items-center">
            <div class="col-auto">
                <a href="/dashboard" class="btn btn-outline-secondary" title="Перейти на главную страницу">
                    <i class="bi bi-house-door"></i>
                </a>
            </div>

            <div class="col-12 col-md">
                <form th:action="@{/locations}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Поиск..."
                           aria-label="Поиск по коду или типу локации">
                    <button type="submit" class="btn btn-primary" title="Найти">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/locations" class="btn btn-outline-secondary" title="Сбросить поиск">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>
            <div class="col-12 col-md-auto">
                <a href="/locations/create" class="btn btn-success w-100">
                    <i class="bi bi-plus-lg"></i> Добавить
                </a>
            </div>
        </div>

        <!-- Таблица -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-upc-scan"></i> Код</th>
                    <th><i class="bi bi-grid-3x3-gap-fill"></i> Тип</th>
                    <th><i class="bi bi-aspect-ratio"></i> Размеры (Ш×Г×В)</th>
                    <th><i class="bi bi-handbag-fill"></i> Макс. вес, кг</th>
                    <th><i class="bi bi-info-circle"></i> Статус</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="loc : ${locations}" th:onclick="|window.location='/locations/edit/' + ${loc.id}|"
                    style="cursor: pointer;">
                    <td class="fw-bold">
                        <span th:text="${loc.code}"></span>
                    </td>
                    <td th:text="${loc.type}"></td>
                    <td th:text="${loc.width != null && loc.depth != null && loc.height != null ? loc.width + '×' + loc.depth + '×' + loc.height : '—'}"></td>
                    <td th:text="${loc.maxWeight != null ? loc.maxWeight + ' кг' : '—'}"></td>
                    <td th:text="${loc.isActive} ? 'Используется' : 'Не используется'"></td>
                </tr>
                <tr th:if="${locations.isEmpty()}">
                    <td colspan="5" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i> Ничего не найдено
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
            <a th:href="@{/locations(page=${currentPage - 1}, search=${search})}"
               th:unless="${currentPage == 1}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span class="pagination-text">
                <i class="bi bi-layout-text-window"></i> Страница<strong th:text="${currentPage}"></strong> из <strong
                    th:text="${totalPages}"></strong>
            </span>
            <a th:href="@{/locations(page=${currentPage + 1}, search=${search})}"
               th:unless="${currentPage == totalPages}"
               class="btn btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>

    </div>
</div>

</body>
</html>
