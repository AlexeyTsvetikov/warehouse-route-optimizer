<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2e9 0%, #c8e6d9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 15px;
            border: none;
        }
        .login-icon {
            font-size: 3rem;
            color: #2b7e3a;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card shadow">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-box-seam login-icon mb-3"></i>
                    <h3 class="mb-4">WMS Склад</h3>

                    <div th:if="${param.error}" class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-triangle"></i> Неверный логин или пароль
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2">
                        <i class="bi bi-check-circle"></i> Вы вышли из системы
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label"><i class="bi bi-person"></i> Логин</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Введите логин" required autofocus aria-label="Логин">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label"><i class="bi bi-lock"></i> Пароль</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Введите пароль" required aria-label="Пароль">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
