<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Запасы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card card-custom p-4">

        <h1 class="text-center mb-4">
            <i class="bi bi-grid-3x2"></i> Запасы
        </h1>

        <!-- Фильтры -->
        <div class="row g-2 mb-4 align-items-center">
            <div class="col-auto">
                <a href="/dashboard" class="btn btn-outline-secondary" title="Главная">
                    <i class="bi bi-house-door"></i>
                </a>
            </div>
            <div class="col-12 col-md-3">
                <select aria-label="Фильтр по локации" class="form-select" onchange="window.location.href='/stocks?location=' + this.value">
                    <option value="">Все локации</option>
                    <option th:each="loc : ${locations}" th:value="${loc.code}" th:text="${loc.code}"
                            th:selected="${loc.code == selectedLocation}"></option>
                </select>
            </div>
            <div class="col-12 col-md">
                <form th:action="@{/stocks}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control"
                           placeholder="Поиск по SKU..." aria-label="Поиск по артикулу">
                    <button type="submit" class="btn btn-primary" title="Найти">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/stocks" class="btn btn-outline-secondary" title="Сбросить">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>
        </div>

        <!-- Таблица запасов (только чтение) -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-upc-scan"></i> SKU</th>
                    <th><i class="bi bi-geo-alt"></i> Локация</th>
                    <th><i class="bi bi-123"></i> Количество</th>
                    <th><i class="bi bi-lock"></i> Резерв</th>
                    <th><i class="bi bi-check-circle"></i> Доступно</th>
                    <th><i class="bi bi-calendar-date"></i> Дата поступления</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${stocks}">
                    <td class="fw-bold" th:text="${s.productSku}">—</td>
                    <td th:text="${s.locationCode}">—</td>
                    <td th:text="${s.quantity}">0</td>
                    <td th:text="${s.reservedQuantity}">0</td>
                    <td th:text="${s.availableQuantity}">0</td>
                    <td th:text="${s.inboundDate != null ? #temporals.format(s.inboundDate, 'dd.MM.yyyy HH:mm') : '—'}">
                        —
                    </td>
                </tr>
                <tr th:if="${stocks.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">
                        <i class="bi bi-inbox"></i> Запасы не найдены
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
            <a th:href="@{/stocks(page=${currentPage - 1}, location=${selectedLocation}, search=${search})}"
               th:unless="${currentPage == 1}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
            <span>Страница <strong th:text="${currentPage}"></strong> из <strong
                    th:text="${totalPages}"></strong></span>
            <a th:href="@{/stocks(page=${currentPage + 1}, location=${selectedLocation}, search=${search})}"
               th:unless="${currentPage == totalPages}" class="btn btn-outline-secondary">
                Вперёд <i class="bi bi-arrow-right"></i>
            </a>
        </div>

    </div>
</div>

</body>
</html>>
